name: flutter_recipe_input_showcase
description: "A portfolio showcase of native camera, audio, and manual recipe input flows."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  injectable: ^2.7.1
  get_it: ^9.2.1

  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  go_router: ^17.1.0

  record: ^6.2.0
  image_picker: ^1.2.1
  camera: ^0.12.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.10.4
  build_verify: ^3.1.1

 
  flutter_gen_runner: ^5.12.0

  freezed: ^3.2.3
  json_serializable: ^6.10.0
  injectable_generator: ^2.7.0


  go_router_builder: ^4.1.3

flutter:
  uses-material-design: true
